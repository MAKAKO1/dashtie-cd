<script>

const sb       = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const sbBronze = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { db: { schema: 'bronze_layer' }, auth: { storageKey: 'tbc-bronze-auth', persistSession: false, autoRefreshToken: false } });

// SKUs de bolsas — editar aquí si cambian
const BOLSAS_SKUS = [
  { sku: '29301984966999',  label: 'Bolsa Pequeña Kraft Blanco' },
  { sku: '29301985066999',  label: 'Bolsa Grande Kraft Blanco'  },
  { sku: '10002265966999',  label: 'Bolsa Pequeña Yapack'       },
  { sku: '10002266066999',  label: 'Bolsa Grande Yapack'        },
];

// Umbral óptimo por SKU por tienda (stock mínimo a mantener — crítico si baja de esto)
const CAP_PER_SKU = {
  '10002265966999': { // 200 unid/caja
    'BTIE002': 600, 'BTIE005': 600, 'BTIE006': 800, 'BTIE007': 800,
    'BTIE009': 600, 'BTIE019': 600, 'BTIE041': 400, 'BTIE044': 400,
    'BTIE045': 400, 'BTIE053': 800, 'BTIE054': 600, 'BTIE055': 400,
    'BTIE057': 400, 'BTIE062': 600, 'BTIE063': 600,
  },
  '10002266066999': { // 400 unid/caja
    'BTIE002': 800, 'BTIE006': 800, 'BTIE007': 800, 'BTIE009': 800,
    'BTIE019': 800, 'BTIE041': 400, 'BTIE045': 400, 'BTIE053': 800,
    'BTIE054': 800, 'BTIE055': 400, 'BTIE057': 400, 'BTIE062': 800,
  },
};

// Unidades por caja/bulto
const BULTOS = {
  '10002265966999': 200, // 200 unid/caja
  '10002266066999': 400, // 400 unid/caja
};

// Datos transformados: Map<codigo_almacen, { nombre, skuStocks: { sku: n } }>
let storeMap = {};

// ── MOCK DATA ──
const MOCK_STORES = [
  { codigo_almacen:'BTIE002', nombre_almacen:'TIENDA TBC OUTLET LA FABRICA PATIO' },
  { codigo_almacen:'BTIE005', nombre_almacen:'TIENDA TBC MALL VIVO CENTRO' },
  { codigo_almacen:'BTIE007', nombre_almacen:'TIENDA TBC MALL ARAUCO ESTACION' },
  { codigo_almacen:'BTIE045', nombre_almacen:'TIENDA TBC PATIO OUTLET TEMUCO' },
  { codigo_almacen:'BTIE009', nombre_almacen:'TIENDA TBC MALL PORTAL NUNOA' },
  { codigo_almacen:'BTIE044', nombre_almacen:'TIENDA TBC MALL ARAUCO MAIPU' },
  { codigo_almacen:'BTIE006', nombre_almacen:'TIENDA TBC MALL PLAZA OESTE' },
  { codigo_almacen:'BTIE053', nombre_almacen:'TIENDA TBC OUTLET PLAZA EGANA' },
];
const MOCK_STOCK = {
  'BTIE002': { '29301984966999': 12, '29301985066999': 8,  '10002265966999': 0,  '10002266066999': 5  },
  'BTIE005': { '29301984966999': 3,  '29301985066999': 0,  '10002265966999': 8,  '10002266066999': 3  },
  'BTIE007': { '29301984966999': 0,  '29301985066999': 20, '10002265966999': 12, '10002266066999': 0  },
  'BTIE045': { '29301984966999': 7,  '29301985066999': 4,  '10002265966999': 2,  '10002266066999': 9  },
  'BTIE009': { '29301984966999': 2,  '29301985066999': 1,  '10002265966999': 0,  '10002266066999': 0  },
  'BTIE044': { '29301984966999': 18, '29301985066999': 11, '10002265966999': 6,  '10002266066999': 14 },
  'BTIE006': { '29301984966999': 0,  '29301985066999': 0,  '10002265966999': 0,  '10002266066999': 0  },
  'BTIE053': { '29301984966999': 5,  '29301985066999': 6,  '10002265966999': 4,  '10002266066999': 2  },
};

function buildMockStoreMap() {
  const map = {};
  MOCK_STORES.forEach(s => {
    map[s.codigo_almacen] = {
      nombre: s.nombre_almacen,
      skuStocks: MOCK_STOCK[s.codigo_almacen] || {},
      skuDescs: {}
    };
  });
  return map;
}

// ── AUTH ──
async function logout() {
  await sb.auth.signOut();
  window.location.href = 'login.html';
}

// ── CACHE ──
function cacheSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), value })); } catch(e) {}
}
function cacheGet(key, ttlMin = 60) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, value } = JSON.parse(raw);
    if (Date.now() - ts > ttlMin * 60 * 1000) return null;
    return value;
  } catch(e) { return null; }
}
function cacheClear(prefix) {
  Object.keys(localStorage).filter(k => k.startsWith(prefix)).forEach(k => localStorage.removeItem(k));
}

function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
  ]);
}

function forceRefresh() {
  cacheClear('tbc_bolsas');
  loadData();
  showToast('Caché limpiado — recargando datos frescos');
}

// ── DATA LOADING ──
async function loadData() {
  const cacheKey = 'tbc_bolsas_all';
  const cached = cacheGet(cacheKey, 60);
  if (cached) {
    storeMap = cached;
    rerender();
    showToast('Datos cargados (caché)');
    return;
  }

  const skuList = BOLSAS_SKUS.map(b => b.sku);
  const BATCH = 1000;
  let allRows = [], from = 0, hasMore = true;

  while (hasMore) {
    let rows, error;
    try {
      const res = await withTimeout(
        sbBronze.from('raw_query_stock_tiendas_cl')
          .select('*')
          .in('SKU Hijo', skuList)
          .range(from, from + BATCH - 1),
        20000
      );
      rows = res.data; error = res.error;
    } catch(e) {
      showToast('Timeout — mostrando muestra', 'err');
      storeMap = buildMockStoreMap();
      rerender(); setDataSource('err', 0); return;
    }

    if (error) {
      showToast('Error: ' + error.message + ' — mostrando muestra', 'err');
      storeMap = buildMockStoreMap();
      rerender(); setDataSource('err', 0); return;
    }

    allRows = allRows.concat(rows || []);
    hasMore = (rows || []).length === BATCH;
    from += BATCH;
  }

  if (allRows.length === 0) {
    showToast('Sin datos en Supabase — mostrando muestra');
    storeMap = buildMockStoreMap();
    rerender(); setDataSource('mock', 0); return;
  }

  // Agrupar por tienda
  const map = {};
  allRows.forEach(r => {
    const cod  = r['Codigo Almacen'];
    const nom  = r['Nombre Almacen'] || cod;
    const sku  = String(r['SKU Hijo'] ?? '');
    const stk  = Number(r['En Stock']) || 0;
    const desc = r['Descripcion'] || r['Descripción'] || '';
    if (!map[cod]) map[cod] = { nombre: nom, skuStocks: {}, skuDescs: {} };
    map[cod].nombre = nom;
    map[cod].skuStocks[sku] = (map[cod].skuStocks[sku] || 0) + stk;
    if (desc && !map[cod].skuDescs[sku]) map[cod].skuDescs[sku] = desc;
  });

  storeMap = map;
  cacheSet(cacheKey, storeMap);
  setDataSource('supabase', allRows.length);
  showToast(`${Object.keys(storeMap).length} tiendas cargadas`, 'ok');
  rerender();
}

// ── DATA SOURCE ──
function setDataSource(src, count) {
  const dot = document.getElementById('dsDot');
  const txt = document.getElementById('dsText');
  if (src === 'supabase') {
    dot.className = 'ds-dot ok';
    txt.textContent = `Fuente: Supabase ✓ — ${count} registros`;
  } else if (src === 'mock') {
    dot.className = 'ds-dot warn';
    txt.textContent = 'Fuente: Vista previa (datos de muestra)';
  } else {
    dot.className = 'ds-dot err';
    txt.textContent = 'Error de conexión — mostrando datos de muestra';
  }
}

async function testConnection() {
  const dot = document.getElementById('dsDot');
  const txt = document.getElementById('dsText');
  dot.className = 'ds-dot'; txt.textContent = 'Probando...';
  try {
    const res = await withTimeout(
      sbBronze.from('raw_query_stock_tiendas_cl').select('*', { count: 'exact', head: true }),
      8000
    );
    if (res.error) {
      dot.className = 'ds-dot err';
      txt.textContent = `ERROR: ${res.error.message}`;
    } else {
      setDataSource('supabase', res.count || 0);
      showToast('Conexión OK', 'ok');
    }
  } catch(e) {
    dot.className = 'ds-dot err';
    txt.textContent = 'TIMEOUT bronze_layer';
  }
}

// ── THRESHOLDS ──

// Alerta por tienda: crítico si algún SKU Yapack está bajo su umbral
function alertLevel(storeEntry, cod) {
  for (const sku of YAPACK_SKUS) {
    const n   = storeEntry.skuStocks[sku] ?? 0;
    const opt = CAP_PER_SKU[sku]?.[cod];
    if (opt && n < opt) return 'critico';
  }
  return 'ok';
}

// Color de celda Yapack: rojo si bajo umbral, verde si ok
function yapackCellClass(n, sku, cod) {
  if (n === 0) return 's-zero';
  const opt = CAP_PER_SKU[sku]?.[cod];
  if (opt) return n < opt ? 's-low' : 's-ok';
  // fallback por cajas si no hay umbral definido
  const cajas = n / (BULTOS[sku] || 1);
  if (cajas < 1) return 's-low';
  if (cajas < 2) return 's-warn';
  return 's-ok';
}

// Texto auxiliar de cajas
function cajasLabel(n, sku) {
  const bxSize = BULTOS[sku];
  if (!bxSize) return '';
  const c = n / bxSize;
  return (Number.isInteger(c) ? c : c.toFixed(1)) + ' caj.';
}

// ── FILTERS ──
function getFilteredStores() {
  const fTienda = document.getElementById('filterTienda').value;
  const fTipo   = document.getElementById('filterTipo').value;
  const fAlerta = document.getElementById('filterAlerta').value;

  return Object.entries(storeMap).filter(([cod, s]) => {
    if (fTienda && cod !== fTienda) return false;
    if (fTipo   && !cod.startsWith(fTipo)) return false;
    if (fAlerta) {
      const lv = alertLevel(s, cod);
      if (fAlerta === 'critico'    && lv !== 'critico')                      return false;
      if (fAlerta === 'precaucion' && lv !== 'critico' && lv !== 'precaucion') return false;
    }
    return true;
  }).sort((a, b) => a[0].localeCompare(b[0]));
}

function clearFilters() {
  document.getElementById('filterTienda').value = '';
  document.getElementById('filterTipo').value   = '';
  document.getElementById('filterBolsa').value  = '';
  document.getElementById('filterAlerta').value = '';
  rerender();
}

const KRAFT_SKUS  = ['29301984966999', '29301985066999'];
const YAPACK_SKUS = ['10002265966999', '10002266066999'];

function getVisibleSkus() {
  const f = document.getElementById('filterBolsa').value;
  if (f === 'kraft')  return BOLSAS_SKUS.filter(b => KRAFT_SKUS.includes(b.sku));
  if (f === 'yapack') return BOLSAS_SKUS.filter(b => YAPACK_SKUS.includes(b.sku));
  return BOLSAS_SKUS;
}

// ── RENDER ──
function rerender() {
  updateTiendaSelect();
  updateKPIs();
  renderTable();
}

function updateTiendaSelect() {
  const sel = document.getElementById('filterTienda');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Todas —</option>';
  Object.entries(storeMap).sort((a,b) => a[0].localeCompare(b[0])).forEach(([cod, s]) => {
    const o = document.createElement('option');
    o.value = cod;
    o.textContent = `${cod} — ${s.nombre}`;
    if (cod === cur) o.selected = true;
    sel.appendChild(o);
  });
}

function updateKPIs() {
  const all = Object.entries(storeMap);

  const skuTotals = {};
  BOLSAS_SKUS.forEach(b => { skuTotals[b.sku] = 0; });
  let sinStock = 0, criticos = 0, enPrecaucion = 0;

  all.forEach(([cod, s]) => {
    BOLSAS_SKUS.forEach(b => { skuTotals[b.sku] += s.skuStocks[b.sku] ?? 0; });
    const lv = alertLevel(s, cod);
    if (lv === 'critico')    criticos++;
    if (lv === 'precaucion') enPrecaucion++;
    if (Math.min(...BOLSAS_SKUS.map(b => s.skuStocks[b.sku] ?? 0)) === 0) sinStock++;
  });

  const skuKpis = BOLSAS_SKUS.map(b =>
    `<div class="kpi ok"><div class="kpi-val">${skuTotals[b.sku].toLocaleString('es-CL')}</div><div class="kpi-lbl">${b.label}</div></div>`
  ).join('');

  document.getElementById('kpiBar').innerHTML = `
    <div class="kpi"><div class="kpi-val">${all.length}</div><div class="kpi-lbl">Tiendas</div></div>
    ${skuKpis}
    <div class="kpi danger"><div class="kpi-val">${sinStock}</div><div class="kpi-lbl">Sin stock (0)</div></div>
    <div class="kpi danger"><div class="kpi-val">${criticos}</div><div class="kpi-lbl">Crítico</div></div>
    <div class="kpi warn"><div class="kpi-val">${enPrecaucion}</div><div class="kpi-lbl">Precaución</div></div>
  `;
}

function renderTable() {
  const content = document.getElementById('mainContent');
  const rows = getFilteredStores();

  document.getElementById('resultCount').textContent = `${rows.length} tienda${rows.length !== 1 ? 's' : ''}`;

  if (!rows.length) {
    content.innerHTML = `<div style="padding:40px;text-align:center;color:#aaa;font-style:italic;">No hay tiendas con los filtros seleccionados.</div>`;
    return;
  }

  // Totales
  const tots = {};
  BOLSAS_SKUS.forEach(b => { tots[b.sku] = 0; });
  rows.forEach(([, s]) => {
    BOLSAS_SKUS.forEach(b => { tots[b.sku] += s.skuStocks[b.sku] ?? 0; });
  });

  // Tomar descripción del primer store que la tenga
  const visibleSkus = getVisibleSkus();
  const skuHeaders = visibleSkus.map(b => {
    const esKraft = KRAFT_SKUS.includes(b.sku);
    const agotandoTag = esKraft ? `<div style="font-size:9px;color:#e67e22;font-weight:700;margin-top:2px;">EN LIQUIDACIÓN</div>` : '';
    return `<th style="min-width:110px;">${b.label}
      ${agotandoTag}
      <div style="font-size:9px;opacity:.5;font-weight:400;">${b.sku}</div>
    </th>`;
  }).join('');

  const skuTotals = visibleSkus.map(b =>
    `<td class="num">${tots[b.sku].toLocaleString('es-CL')}</td>`
  ).join('');

  const bodyRows = rows.map(([cod, s]) => {
    const skuCells = visibleSkus.map(b => {
      const n = s.skuStocks[b.sku] ?? 0;
      const esKraft = KRAFT_SKUS.includes(b.sku);
      if (esKraft) {
        return `<td class="num" style="background:#f4f4f4;color:#999;" title="En liquidación — sin reposición">${n.toLocaleString('es-CL')}</td>`;
      }
      // Yapack: fondo semáforo, texto negro, caj. arriba derecha, óptima abajo izquierda
      const cls  = yapackCellClass(n, b.sku, cod);
      const caj  = cajasLabel(n, b.sku);
      const opt  = CAP_PER_SKU[b.sku]?.[cod];
      const hint = opt ? `title="Óptimo: ${opt.toLocaleString('es-CL')} unid"` : '';
      const optTag = opt ? `<span style="position:absolute;bottom:2px;left:4px;font-size:8px;color:#555;font-weight:400;opacity:.8;">ópt ${opt.toLocaleString('es-CL')}</span>` : '';
      const cajTag = caj ? `<span style="position:absolute;top:2px;right:4px;font-size:8px;color:#555;opacity:.7;">${caj}</span>` : '';
      return `<td class="num ${cls}" ${hint} style="position:relative;color:#111;padding:14px 8px 10px;">${cajTag}${n.toLocaleString('es-CL')}${optTag}</td>`;
    }).join('');

    return `<tr>
      <td style="font-weight:700;color:#0077BB;white-space:nowrap;">${cod}</td>
      <td class="txt" style="min-width:200px;">${s.nombre}</td>
      ${skuCells}
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ALMACÉN</th>
            <th style="text-align:left;min-width:200px;">NOMBRE TIENDA</th>
            ${skuHeaders}
          </tr></thead>
          <tbody>${bodyRows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── EXPORT ──
function exportCSV() {
  const rows = getFilteredStores();
  if (!rows.length) { showToast('Sin datos para exportar', 'err'); return; }

  const wsData = rows.map(([cod, s]) => {
    const row = { 'Codigo Almacen': cod, 'Nombre Tienda': s.nombre };
    BOLSAS_SKUS.forEach(b => { row[b.label] = s.skuStocks[b.sku] ?? 0; });
    row['Total Bolsas'] = BOLSAS_SKUS.reduce((a, b) => a + (s.skuStocks[b.sku] ?? 0), 0);
    row['Estado'] = alertLevel(s, cod).toUpperCase();
    return row;
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(wsData);
  ws['!cols'] = [{ wch: 12 }, { wch: 38 }, { wch: 14 }, { wch: 14 }, { wch: 12 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws, 'Bolsas');
  XLSX.writeFile(wb, `STOCK_BOLSAS_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast(`${rows.length} tiendas exportadas`);
}

// ── UI ──
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || 'Cargando...';
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', async () => {
  const d = new Date();
  document.getElementById('headerDate').textContent =
    `Actualizado: ${d.toLocaleDateString('es-CL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;

  // Mock inmediato
  storeMap = buildMockStoreMap();
  rerender();
  showToast('Cargando datos reales...');

  // Auth (no bloqueante)
  try {
    const { data: { session } } = await Promise.race([
      sb.auth.getSession(),
      new Promise((_, r) => setTimeout(() => r(new Error('timeout')), 5000))
    ]);
    document.getElementById('userBadge').textContent = session ? session.user.email : 'Vista previa';
  } catch(e) {
    document.getElementById('userBadge').textContent = 'Vista previa';
  }

  try { await loadData(); } catch(e) { hideLoading(); }

  // Auto-refresh silencioso cada 15 minutos
  setInterval(() => { cacheClear('tbc_bolsas'); loadData(); }, 15 * 60 * 1000);
});
